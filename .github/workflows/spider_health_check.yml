name: Spider Health Check

on:
  schedule:
    # every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:   # allow manual runs

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.3.0"

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true
      - run: |
          cd packages/saddogs-scrape
          poetry install
          poetry run playwright install chromium
      - name: Add hosts entry for flaky domains
        run: |
          echo "178.33.166.191 albergueanimalesteguise.com" | sudo tee -a /etc/hosts
      - name: Run health check
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd packages/saddogs-scrape/saddogs_scrape
          mkdir -p reports
          poetry run python run_all.py --dry-run
      - name: Upload health check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spider-health-report
          path: packages/saddogs-scrape/saddogs_scrape/reports/report_*.json