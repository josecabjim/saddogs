name: Daily Scrape

on:
  schedule:
    - cron: "30 6 * * *"  # daily at 06:30 UTC
  workflow_dispatch:     # allows manual runs

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.3.0"

jobs:
  scrape_daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true
      - run: |
          cd packages/saddogs-scrape
          poetry install
          poetry run playwright install chromium
      - name: Add hosts entry for flaky domains
        run: |
          echo "178.33.166.191 albergueanimalesteguise.com" | sudo tee -a /etc/hosts
      - run: |
          cd packages/saddogs-scrape/saddogs_scrape
          poetry run python run_all.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}