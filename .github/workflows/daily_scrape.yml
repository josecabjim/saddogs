name: Daily Scrape

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours: 00:00, 04:00 ... 20:00 UTC
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.3.0"

jobs:
  check_missing:
    runs-on: ubuntu-latest
    outputs:
      missing_spiders: ${{ steps.check.outputs.missing_spiders }}
      has_missing: ${{ steps.check.outputs.has_missing }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true
      - run: cd packages/saddogs-scrape && poetry install
      - name: Check which rescues are missing today
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd packages/saddogs-scrape/saddogs_scrape
          echo "Checking for missing rescues at $(date -u '+%Y-%m-%d %H:%M UTC')..."
          OUTPUT=$(poetry run python check_missing.py)

          if [ "$OUTPUT" = "__none__" ]; then
            echo "✅ All rescues already have data for today — skipping scrape."
            echo "has_missing=false" >> $GITHUB_OUTPUT
          else
            SPIDERS=$(echo "$OUTPUT" | paste -sd ',' -)
            COUNT=$(echo "$OUTPUT" | wc -l | tr -d ' ')
            echo "⚠️ $COUNT rescue(s) missing data: $SPIDERS"
            echo "has_missing=true" >> $GITHUB_OUTPUT
            echo "missing_spiders=$SPIDERS" >> $GITHUB_OUTPUT
          fi

  scrape:
    needs: check_missing
    if: needs.check_missing.outputs.has_missing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-in-project: true
      - run: |
          cd packages/saddogs-scrape
          poetry install
          poetry run playwright install chromium
      - name: Run missing spiders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADEJE_PROXY_URL: ${{ secrets.ADEJE_PROXY_URL }}
        run: |
          cd packages/saddogs-scrape/saddogs_scrape
          poetry run python run_all.py --spiders "$MISSING" || true
          