<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dog Database</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 40px;
}
pre {
  background: #f6f6f6;
  padding: 20px;
  overflow-x: auto;
}
</style>

</head>

<body>

<h2>Database Data</h2>

<pre id="table">Loading...</pre>

<p>
<a href="graph.html">Census Graph</a> |
<a href="graph-rescues.html">Rescues Graph</a>
</p>

<script>

const SUPABASE_URL="https://msxqdtjoaicxmzpmhndb.supabase.co"
const SUPABASE_KEY="sb_publishable_uDJ7_smtnDquaKX4VMh8EA_O18behoj"

const { createClient } = supabase;

const client = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function loadData(){

  const { data, error } = await client
    .from("census")
    .select("*")
    .order("created_at",{ascending:true});

  if(error){
    document.getElementById("table").textContent = error.message;
    return;
  }

  const headers = Object.keys(data[0]);

  const widths = {};

  headers.forEach(h=>{
    widths[h] = Math.max(
      h.length,
      ...data.map(r=>String(r[h]).length)
    );
  });

  function rowLine(row){
    return "| " + headers.map(h =>
      String(row[h]).padEnd(widths[h])
    ).join(" | ") + " |";
  }

  const divider =
    "+-" + headers.map(h => "-".repeat(widths[h])).join("-+-") + "-+";

  const lines = [
    divider,
    rowLine(Object.fromEntries(headers.map(h=>[h,h]))),
    divider
  ];

  data.forEach(r => lines.push(rowLine(r)));

  lines.push(divider);

  document.getElementById("table").textContent =
    lines.join("\n");
}

loadData();

</script>

</body>
</html>
