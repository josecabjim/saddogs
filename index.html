<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sad Dogs Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
    }

    .last-updated {
      font-size: 13px;
      color: #666;
      background: #f5f5f5;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .loader {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    nav {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    nav a {
      padding: 10px 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 14px;
      border: 2px solid transparent;
    }

    nav a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    nav a.active {
      background: white;
      color: #667eea;
      border-color: #667eea;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 28px;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .chart-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .chart-card h2 {
      font-size: 20px;
      color: #667eea;
      margin-bottom: 8px;
      margin-top: 0;
    }

    .chart-card p {
      font-size: 13px;
      color: #999;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 400px;
      margin-bottom: 12px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    footer {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 12px;
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }

    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 28px;
      }

      .header-info {
        flex-direction: column;
        align-items: flex-start;
      }

      nav {
        width: 100%;
      }

      nav a {
        flex: 1;
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      header {
        padding: 20px;
        margin-bottom: 20px;
      }

      header h1 {
        font-size: 24px;
      }

      .content {
        gap: 20px;
        margin-bottom: 20px;
      }

      .chart-card {
        padding: 16px;
      }

      .chart-container {
        height: 280px;
      }

      nav a {
        padding: 8px 12px;
        font-size: 13px;
      }
    }

  </style>

</head>

<body>

<div class="container">
  <header>
    <h1>🐕 Sad Dogs Dashboard</h1>
    <div class="header-info">
      <div class="last-updated">
        <span class="loader"></span> Loading data...
      </div>
    </div>
    <nav>
      <a href="index.html" class="active"><strong>Graphs</strong></a>
      <a href="data.html">Data Tables</a>
    </nav>
  </header>

  <div id="error" style="display: none;" class="error"></div>

  <div class="content" id="charts">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading your data...</p>
    </div>
  </div>

  <footer>
    <p>🔄 Data refreshes daily at 8:00 AM • Powered by Sad Dogs Analytics</p>
  </footer>
</div>

<script>

  const SUPABASE_URL = "https://msxqdtjoaicxmzpmhndb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_uDJ7_smtnDquaKX4VMh8EA_O18behoj";

  const { createClient } = supabase;

  const client = createClient(SUPABASE_URL, SUPABASE_KEY);

  const colors = [
    "#667eea", "#764ba2", "#f093fb",
    "#4facfe", "#00f2fe", "#43e97b",
    "#fa709a", "#fee140", "#30cfd0"
  ];

  function processCensusData(rows) {
    const seen = new Set();
    const filtered = [];

    rows.forEach(r => {
      const date = r.created_at.slice(0, 10);
      if (!seen.has(date)) {
        seen.add(date);
        filtered.push(r);
      }
    });

    const labels = filtered.map(r => r.created_at.slice(0, 10));

    const skip = ["id", "created_at"];

    const numeric = Object.keys(filtered[0])
      .filter(c => !skip.includes(c));

    const datasets = {};

    numeric.forEach(col => {
      datasets[col] = filtered.map(r => r[col]);
    });

    datasets["Total"] = filtered.map(r =>
      numeric.reduce((s, c) => s + r[c], 0)
    );

    return { labels, datasets };
  }

  function processRescuesData(rows) {
    const aggregated = {};

    rows.forEach(r => {
      const date = r.created_at.slice(0, 10);
      const island = r.island;

      if (!aggregated[date]) aggregated[date] = {};
      if (!aggregated[date][island]) aggregated[date][island] = 0;

      aggregated[date][island] += r.total_dogs;
    });

    const labels = Object.keys(aggregated).sort();

    const islands =
      [...new Set(rows.map(r => r.island))].sort();

    const datasets = {};

    islands.forEach(i => datasets[i] = []);

    const totals = [];

    labels.forEach(date => {
      let daily = 0;

      islands.forEach(island => {
        const v = aggregated[date][island] || 0;
        datasets[island].push(v);
        daily += v;
      });

      totals.push(daily);
    });

    datasets["Total"] = totals;

    return { labels, datasets };
  }

  function createChart(canvasId, title, labels, datasets) {
    const chartDatasets =
      Object.entries(datasets).map(([k, v], i) => ({
        label: k,
        data: v,
        fill: false,
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length],
        tension: 0.4,
        borderWidth: k === "Total" ? 3 : 2,
        pointRadius: k === "Total" ? 4 : 3,
        pointBackgroundColor: colors[i % colors.length],
        pointBorderColor: "#fff",
        pointBorderWidth: 2,
        pointHoverRadius: 6,
      }));

    const ctx = document.getElementById(canvasId);
    
    if (!ctx) return;

    new Chart(ctx, {
      type: "line",
      data: { labels, datasets: chartDatasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: {
              font: { size: 12, weight: 600 },
              padding: 16,
              usePointStyle: true,
              pointStyle: 'circle'
            }
          },
          tooltip: {
            mode: 'index',
            intersect: false,
            backgroundColor: 'rgba(0, 0, 0, 0.8)',
            titleFont: { size: 14, weight: 'bold' },
            bodyFont: { size: 12 },
            padding: 12,
            cornerRadius: 8,
            displayColors: true
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: {
              drawBorder: false,
              color: 'rgba(0, 0, 0, 0.05)'
            }
          },
          x: {
            grid: {
              drawBorder: false,
              display: false
            }
          }
        }
      }
    });
  }

  async function load() {
    try {
      // Load census data
      const { data: censusData, error: censusError } = await client
        .from("census")
        .select("*")
        .order("created_at", { ascending: true });

      if (censusError) throw censusError;

      const { labels: censusLabels, datasets: censusDatasets } = processCensusData(censusData);

      // Load rescues data
      const { data: rescuesData, error: rescuesError } = await client
        .from("rescues")
        .select("*")
        .order("created_at", { ascending: true });

      if (rescuesError) throw rescuesError;

      const { labels: rescuesLabels, datasets: rescuesDatasets } = processRescuesData(rescuesData);

      // Update header
      const lastDate = censusLabels[censusLabels.length - 1] || "No data";
      const dateRange = `${censusLabels[0]} to ${lastDate}`;
      document.querySelector('.last-updated').innerHTML = `📊 Last update: ${lastDate}`;

      // Replace loading content with charts
      const chartsContainer = document.getElementById('charts');
      chartsContainer.innerHTML = `
        <div class="chart-card">
          <h2>Dogs Registered in Canary Islands</h2>
          <p>${dateRange}</p>
          <div class="chart-container">
            <canvas id="censusChart"></canvas>
          </div>
        </div>
        
        <div class="chart-card">
          <h2>Rescued Dogs by Island</h2>
          <p>${dateRange}</p>
          <div class="chart-container">
            <canvas id="rescuesChart"></canvas>
          </div>
        </div>
      `;

      createChart("censusChart", "Census", censusLabels, censusDatasets);
      createChart("rescuesChart", "Rescues", rescuesLabels, rescuesDatasets);

    } catch (error) {
      console.error('Error loading data:', error);
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'block';
      errorDiv.textContent = `Error loading data: ${error.message}`;
      
      const chartsContainer = document.getElementById('charts');
      chartsContainer.innerHTML = '<p style="color: white; text-align: center;">Unable to load charts. Please try refreshing the page.</p>';
    }
  }

  load();

</script>

</body>
</html>
