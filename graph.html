<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Census Graph</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  margin: 40px;
}

canvas {
  max-width: 100%;
  height: 400px;
}
</style>

</head>

<body>

<h2>Dogs Registered in Canary Islands</h2>

<canvas id="chart"></canvas>

<script>

const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_PUBLISHABLE_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function rowsToChartData(rows){

  const seen = new Set();
  const filtered = [];

  rows.forEach(r=>{
    const date = r.created_at.slice(0,10);
    if(!seen.has(date)){
      seen.add(date);
      filtered.push(r);
    }
  });

  const labels = filtered.map(r => r.created_at.slice(0,10));

  const skip = ["id","created_at"];

  const numeric = Object.keys(filtered[0])
    .filter(c => !skip.includes(c));

  const datasets = {};

  numeric.forEach(col=>{
    datasets[col] = filtered.map(r=>r[col]);
  });

  datasets["Total"] = filtered.map(r =>
    numeric.reduce((s,c)=>s+r[c],0)
  );

  return {labels,datasets};
}

async function load(){

  const {data} = await supabase
    .from("census")
    .select("*")
    .order("created_at",{ascending:true});

  const {labels,datasets} = rowsToChartData(data);

  const pastel = [
    "#FFB6B9","#FAD0C4","#A8E6CF",
    "#DCEDC2","#FFD3B6","#FFAAA5",
    "#84FAB0","#8FD3F4","#C6FFDD"
  ];

  const chartDatasets =
    Object.entries(datasets).map(([k,v],i)=>({
      label:k,
      data:v,
      fill:false,
      borderColor:pastel[i%pastel.length],
      tension:0.3,
      borderWidth: k==="Total" ? 3 : 2
    }));

  new Chart(
    document.getElementById("chart"),
    {
      type:"line",
      data:{labels,datasets:chartDatasets},
      options:{
        responsive:true,
        interaction:{mode:'nearest',intersect:false}
      }
    }
  );
}

load();

</script>

</body>
</html>
